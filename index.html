<!DOCTYPE html>
<html>
<head>
<title>ProCare Concrete</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;padding:15px;background:#f4f4f4}
h1{color:#222}
input,textarea,button{width:100%;padding:12px;margin:6px 0;font-size:16px}
.card{background:white;padding:12px;margin:10px 0;border-radius:10px}
button{background:#222;color:white;border:0;border-radius:8px}
.statusButtons button{margin:4px 0}
.selected{background:#0b7cff!important}
.smallBtn{font-size:14px;padding:10px}
</style>
</head>
<body>

<h1>ProCare Concrete</h1>

<input id="jobName" placeholder="Job name">
<input id="jobAddress" placeholder="Address">
<textarea id="jobNotes" placeholder="Notes"></textarea>

<h3>Pick Job Status</h3>
<div class="statusButtons">
<button onclick="chooseStatus('Not Ready to Start')" id="btnNotReady">Not Ready to Start</button>
<button onclick="chooseStatus('Ready to Start')" id="btnReadyStart">Ready to Start</button>
<button onclick="chooseStatus('Ready to Pour')" id="btnReadyPour">Ready to Pour</button>
<button onclick="chooseStatus('Finished')" id="btnFinished">Finished</button>
</div>

<button onclick="addJob()">Add Job</button>

<h2>Active Jobs</h2>
<div id="active"></div>

<h2>Billed Jobs</h2>
<div id="billed"></div>

<script>
let jobs = JSON.parse(localStorage.getItem("jobs") || "[]");
let pickedStatus = "Not Ready to Start";

function chooseStatus(status){
  pickedStatus = status;

  document.getElementById("btnNotReady").classList.remove("selected");
  document.getElementById("btnReadyStart").classList.remove("selected");
  document.getElementById("btnReadyPour").classList.remove("selected");
  document.getElementById("btnFinished").classList.remove("selected");

  if(status === "Not Ready to Start") document.getElementById("btnNotReady").classList.add("selected");
  if(status === "Ready to Start") document.getElementById("btnReadyStart").classList.add("selected");
  if(status === "Ready to Pour") document.getElementById("btnReadyPour").classList.add("selected");
  if(status === "Finished") document.getElementById("btnFinished").classList.add("selected");
}

function save(){
  localStorage.setItem("jobs", JSON.stringify(jobs));
  render();
}

function addJob(){
  const jobName = document.getElementById("jobName");
  const jobAddress = document.getElementById("jobAddress");
  const jobNotes = document.getElementById("jobNotes");

  if(!jobName.value.trim()){
    alert("Add a job name");
    return;
  }

  jobs.push({
    id: Date.now(),
    name: jobName.value,
    address: jobAddress.value,
    notes: jobNotes.value,
    status: pickedStatus
  });

  jobName.value = "";
  jobAddress.value = "";
  jobNotes.value = "";
  pickedStatus = "Not Ready to Start";
  chooseStatus("Not Ready to Start");
  save();
}

function setStatus(id,status){
  jobs = jobs.map(j => j.id===id ? {...j,status} : j);
  save();
}

function render(){
  document.getElementById("active").innerHTML="";
  document.getElementById("billed").innerHTML="";

  jobs.forEach(j=>{
    let box=document.createElement("div");
    box.className="card";
    box.innerHTML=`
      <b>${j.name}</b><br>
      ${j.address}<br>
      ${j.notes}<br><br>
      <b>Status:</b> ${j.status}<br><br>
      ${j.status !== "Finished" ? `
        <button class="smallBtn" onclick="setStatus(${j.id}, 'Not Ready to Start')">Not Ready to Start</button>
        <button class="smallBtn" onclick="setStatus(${j.id}, 'Ready to Start')">Ready to Start</button>
        <button class="smallBtn" onclick="setStatus(${j.id}, 'Ready to Pour')">Ready to Pour</button>
        <button class="smallBtn" onclick="setStatus(${j.id}, 'Finished')">Finished</button>
      ` : `<b>Finished / Billed</b>`}
    `;

    if(j.status==="Finished"){
      document.getElementById("billed").appendChild(box);
    } else {
      document.getElementById("active").appendChild(box);
    }
  });
}

chooseStatus("Not Ready to Start");
render();
</script>

</body>
</html>
