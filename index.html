<!DOCTYPE html>
<html>
<head>
<title>ProCare Concrete</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;padding:15px;background:#f4f4f4}
input,textarea,button{width:100%;padding:12px;margin:6px 0;font-size:16px}
.card{background:white;padding:12px;margin:10px 0;border-radius:10px}
button{background:#222;color:white;border:0;border-radius:8px}
.smallBtn{font-size:14px;padding:10px}
.section{margin-top:25px}
</style>
</head>
<body>

<h1>ProCare Concrete</h1>

<input id="jobName" placeholder="Job name">
<input id="jobAddress" placeholder="Address">
<textarea id="jobNotes" placeholder="Notes"></textarea>
<button onclick="addJob()">Add Job</button>

<div class="section"><h2>Not Ready to Start</h2><div id="notReady"></div></div>
<div class="section"><h2>Ready to Start</h2><div id="readyStart"></div></div>
<div class="section"><h2>Ready to Pour</h2><div id="readyPour"></div></div>
<div class="section"><h2>Finished</h2><div id="finished"></div></div>
<div class="section"><h2>Billed</h2><div id="billed"></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDOpz94EHYU-cnj_H44DqEgV496OvgJ4SE",
  authDomain: "procare-6293d.firebaseapp.com",
  projectId: "procare-6293d",
  storageBucket: "procare-6293d.firebasestorage.app",
  messagingSenderId: "461068003975",
  appId: "1:461068003975:web:dd3221025ff7cd5299a622"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const jobsRef = collection(db, "jobs");

window.addJob = async function(){
  const jobName = document.getElementById("jobName");
  const jobAddress = document.getElementById("jobAddress");
  const jobNotes = document.getElementById("jobNotes");

  if(!jobName.value.trim()){
    alert("Add a job name");
    return;
  }

  await addDoc(jobsRef, {
    name: jobName.value,
    address: jobAddress.value,
    notes: jobNotes.value,
    status: "Not Ready to Start",
    createdAt: serverTimestamp()
  });

  jobName.value = "";
  jobAddress.value = "";
  jobNotes.value = "";
};

window.setStatus = async function(id, oldStatus, newStatus, jobName){
  if(oldStatus !== newStatus){
    const confirmChange = confirm(
      `Are you sure you want to change "${jobName}" from "${oldStatus}" to "${newStatus}"?`
    );
    if(!confirmChange) return;
  }

  await updateDoc(doc(db, "jobs", id), {
    status: newStatus
  });
};

window.deleteJob = async function(id, jobName){
  if(confirm(`Delete "${jobName}"?`)){
    await deleteDoc(doc(db, "jobs", id));
  }
};

function jobCard(id, j){
  const box = document.createElement("div");
  box.className = "card";
  box.innerHTML = `
    <b>${j.name}</b><br>
    ${j.address || ""}<br>
    ${j.notes || ""}<br><br>
    <b>Status:</b> ${j.status}<br><br>

    <button class="smallBtn" onclick="setStatus('${id}', '${j.status}', 'Not Ready to Start', '${j.name}')">Not Ready</button>
    <button class="smallBtn" onclick="setStatus('${id}', '${j.status}', 'Ready to Start', '${j.name}')">Ready to Start</button>
    <button class="smallBtn" onclick="setStatus('${id}', '${j.status}', 'Ready to Pour', '${j.name}')">Ready to Pour</button>
    <button class="smallBtn" onclick="setStatus('${id}', '${j.status}', 'Finished', '${j.name}')">Finished</button>
    <button class="smallBtn" onclick="setStatus('${id}', '${j.status}', 'Billed', '${j.name}')">Billed</button>
    <button class="smallBtn" onclick="deleteJob('${id}', '${j.name}')">Delete Job</button>
  `;
  return box;
}

onSnapshot(jobsRef, (snapshot) => {
  document.getElementById("notReady").innerHTML = "";
  document.getElementById("readyStart").innerHTML = "";
  document.getElementById("readyPour").innerHTML = "";
  document.getElementById("finished").innerHTML = "";
  document.getElementById("billed").innerHTML = "";

  snapshot.forEach((docSnap) => {
    const j = docSnap.data();
    const card = jobCard(docSnap.id, j);

    if(j.status === "Not Ready to Start") notReady.appendChild(card);
    if(j.status === "Ready to Start") readyStart.appendChild(card);
    if(j.status === "Ready to Pour") readyPour.appendChild(card);
    if(j.status === "Finished") finished.appendChild(card);
    if(j.status === "Billed") billed.appendChild(card);
  });
});
</script>

</body>
</html>
