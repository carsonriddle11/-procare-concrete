<!DOCTYPE html>
<html>
<head>
<title>ProCare Concrete</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;padding:15px;background:#f4f4f4}
h1{color:#222}
input,textarea,button{width:100%;padding:12px;margin:6px 0;font-size:16px}
.card{background:white;padding:12px;margin:10px 0;border-radius:10px}
button{background:#222;color:white;border:0;border-radius:8px}
.smallBtn{font-size:14px;padding:10px}
.section{margin-top:25px}
</style>
</head>
<body>

<h1>ProCare Concrete</h1>

<input id="jobName" placeholder="Job name">
<input id="jobAddress" placeholder="Address">
<textarea id="jobNotes" placeholder="Notes"></textarea>
<button onclick="addJob()">Add Job</button>

<div class="section"><h2>Not Ready to Start</h2><div id="notReady"></div></div>
<div class="section"><h2>Ready to Start</h2><div id="readyStart"></div></div>
<div class="section"><h2>Ready to Pour</h2><div id="readyPour"></div></div>
<div class="section"><h2>Finished</h2><div id="finished"></div></div>
<div class="section"><h2>Billed</h2><div id="billed"></div></div>

<script>
let jobs = JSON.parse(localStorage.getItem("jobs") || "[]");

function save(){
  localStorage.setItem("jobs", JSON.stringify(jobs));
  render();
}

function addJob(){
  const jobName = document.getElementById("jobName");
  const jobAddress = document.getElementById("jobAddress");
  const jobNotes = document.getElementById("jobNotes");

  if(!jobName.value.trim()){
    alert("Add a job name");
    return;
  }

  jobs.push({
    id: Date.now(),
    name: jobName.value,
    address: jobAddress.value,
    notes: jobNotes.value,
    status: "Not Ready to Start"
  });

  jobName.value = "";
  jobAddress.value = "";
  jobNotes.value = "";

  save();
}

function setStatus(id,status){
  const job = jobs.find(j => j.id === id);

  if(job.status !== status){
    const confirmChange = confirm(
      `Are you sure you want to change "${job.name}" from "${job.status}" to "${status}"?`
    );

    if(!confirmChange){
      return;
    }
  }

  jobs = jobs.map(j =>
    j.id === id ? {...j, status} : j
  );

  save();
}

function deleteJob(id){
  const job = jobs.find(j => j.id === id);

  if(confirm(`Delete "${job.name}"?`)){
    jobs = jobs.filter(j => j.id !== id);
    save();
  }
}

function jobCard(j){
  let box=document.createElement("div");
  box.className="card";
  box.innerHTML=`
    <b>${j.name}</b><br>
    ${j.address}<br>
    ${j.notes}<br><br>
    <b>Status:</b> ${j.status}<br><br>

    <button class="smallBtn" onclick="setStatus(${j.id}, 'Not Ready to Start')">Not Ready</button>
    <button class="smallBtn" onclick="setStatus(${j.id}, 'Ready to Start')">Ready to Start</button>
    <button class="smallBtn" onclick="setStatus(${j.id}, 'Ready to Pour')">Ready to Pour</button>
    <button class="smallBtn" onclick="setStatus(${j.id}, 'Finished')">Finished</button>
    <button class="smallBtn" onclick="setStatus(${j.id}, 'Billed')">Billed</button>
    <button class="smallBtn" onclick="deleteJob(${j.id})">Delete Job</button>
  `;
  return box;
}

function render(){
  document.getElementById("notReady").innerHTML="";
  document.getElementById("readyStart").innerHTML="";
  document.getElementById("readyPour").innerHTML="";
  document.getElementById("finished").innerHTML="";
  document.getElementById("billed").innerHTML="";

  jobs.forEach(j=>{
    if(j.status==="Not Ready to Start") document.getElementById("notReady").appendChild(jobCard(j));
    if(j.status==="Ready to Start") document.getElementById("readyStart").appendChild(jobCard(j));
    if(j.status==="Ready to Pour") document.getElementById("readyPour").appendChild(jobCard(j));
    if(j.status==="Finished") document.getElementById("finished").appendChild(jobCard(j));
    if(j.status==="Billed") document.getElementById("billed").appendChild(jobCard(j));
  });
}

render();
</script>

</body>
</html>
